<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>TrueBook - Home</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body
    class="bg-light"
    style="
        background-image: url('/background-image/wall2.jpg');
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
    ">

<div class="container mt-4">

    <!-- Navbar -->
	
	<nav class="navbar navbar-expand-lg navbar-dark rounded shadow"
	     style="background-color: #1f1f1f;">	
	    <div class="container-fluid">

	        <a class="navbar-brand fw-bold" th:href="@{/}">
	            <i class="bi bi-journal-bookmark-fill"></i>
	            TrueBook
	        </a>

	        <div class="ms-auto d-flex align-items-center">

	            <span class="text-white me-3">
	                <i class="bi bi-person-circle"></i>
	                Welcome,
	                <strong th:text="${user.username}"></strong> 👋
	            </span>

	            <a class="btn btn-success me-2"
	               th:href="@{/post/create}">
	                <i class="bi bi-plus-circle"></i>
	                Create Post
	            </a>

	            <a class="btn btn-warning me-2"
	               th:href="@{/profile}">
	                <i class="bi bi-person-badge-fill"></i>
	                My Profile
	            </a>

	            <a class="btn btn-danger"
	               th:href="@{/logout}">
	                <i class="bi bi-box-arrow-right"></i>
	                Logout
	            </a>

	        </div>

	    </div>

	</nav>

    <br>

    <!-- Search -->

    <div class="card shadow mb-4">

        <div class="card-body">

            <form action="/search" method="get">

                <div class="input-group">

                    <input
                            class="form-control"
                            type="text"
                            name="keyword"
                            placeholder="Search by title, author, category or date (YYYY-MM-DD)">

                    <button class="btn btn-primary">

                        <i class="bi bi-search"></i>

                    </button>

                </div>

            </form>

        </div>

    </div>

    <!-- Posts -->

    <div th:each="post : ${posts}">

        <div class="card shadow mb-4">

            <img
                    th:if="${post.imageName != null}"
                    th:src="@{/uploads/{img}(img=${post.imageName})}"
                    class="card-img-top"
                    style="height:250px;object-fit:cover;">

            <div class="card-body">

                <h3 class="card-title"
                    th:text="${post.title}">
                </h3>

                <p class="card-text"
                   th:text="${post.content}">
                </p>

                <p>

                    <strong>
                        <i class="bi bi-person-fill"></i>
                        Author :
                    </strong>

                    <span th:text="${post.author.username}">
                    </span>

                </p>

                <p>

                    <strong>
                        <i class="bi bi-calendar-event"></i>
                        Created :
                    </strong>

                    <span
                            th:text="${#temporals.format(post.createdAt,'dd MMM yyyy, hh:mm a')}">
                    </span>

                </p>

                <p th:if="${post.category!=null}">

                    <strong>

                        <i class="bi bi-tag-fill"></i>

                        Category :

                    </strong>

                    <span
                            th:text="${post.category.name}">
                    </span>

                </p>

				<div class="d-flex align-items-center gap-2 flex-wrap">

				    <a class="btn btn-info"
				       th:href="@{/post/{id}(id=${post.id})}">
				        📖 Read More
				    </a>

				    <div th:if="${post.author.email == #authentication.name}">

				        <a class="btn btn-warning"
				           th:href="@{/post/edit/{id}(id=${post.id})}">
				            ✏️ Edit
				        </a>

				        <a class="btn btn-danger"
				           th:href="@{/post/delete/{id}(id=${post.id})}"
				           onclick="return confirm('Delete this post?')">
				            🗑 Delete
				        </a>

				    </div>

				    <form th:action="@{/post/{id}/like(id=${post.id})}"
				          method="post">

				        <button class="btn btn-outline-danger">

				            <span th:if="${likedPosts[post.id]}">
				                ❤️ Unlike
				            </span>

				            <span th:unless="${likedPosts[post.id]}">
				                🤍 Like
				            </span>

				        </button>

				    </form>

				    <span class="badge bg-danger fs-6">
				        ❤️
				        <span th:text="${likeCounts[post.id]}"></span>
				    </span>

				</div>
                    </form>

                </div>

            </div>

        </div>

    </div>

    <!-- Pagination -->

    <nav>

        <ul class="pagination justify-content-center">

            <li class="page-item"
                th:classappend="${currentPage==0}?'disabled'">

                <a class="page-link"

                   th:if="${isSearch!=true}"

                   th:href="@{/(page=${currentPage-1})}">

                    Previous

                </a>

                <a class="page-link"

                   th:if="${isSearch==true}"

                   th:href="@{/search(keyword=${keyword},page=${currentPage-1})}">

                    Previous

                </a>

            </li>

            <li class="page-item"

                th:each="i:${#numbers.sequence(0,totalPages-1)}"

                th:classappend="${i==currentPage}?'active'">

                <a class="page-link"

                   th:if="${isSearch!=true}"

                   th:href="@{/(page=${i})}"

                   th:text="${i+1}">
                </a>

                <a class="page-link"

                   th:if="${isSearch==true}"

                   th:href="@{/search(keyword=${keyword},page=${i})}"

                   th:text="${i+1}">
                </a>

            </li>

            <li class="page-item"

                th:classappend="${currentPage==totalPages-1}?'disabled'">

                <a class="page-link"

                   th:if="${isSearch!=true}"

                   th:href="@{/(page=${currentPage+1})}">

                    Next

                </a>

                <a class="page-link"

                   th:if="${isSearch==true}"

                   th:href="@{/search(keyword=${keyword},page=${currentPage+1})}">

                    Next

                </a>

            </li>

        </ul>

    </nav>

</div>

</body>
</html>
