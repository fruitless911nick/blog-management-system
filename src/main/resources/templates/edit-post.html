
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>TrueBook | Edit Post</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body class="bg-light">

<div class="container mt-4">

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary rounded shadow">

        <div class="container-fluid">

            <a class="navbar-brand fw-bold"
               th:href="@{/}">

                <i class="bi bi-journal-bookmark-fill"></i>

                TrueBook

            </a>

            <a class="btn btn-warning"
               th:href="@{/}">

                <i class="bi bi-house-fill"></i>

                Home

            </a>

        </div>

    </nav>

    <br>

    <div class="card shadow">

        <div class="card-body">

            <h2>

                <i class="bi bi-pencil-square"></i>

                Edit Post

            </h2>

            <hr>

            <form th:action="@{/post/update}" method="post" enctype="multipart/form-data">

                <input type="hidden" name="id" th:value="${post.id}">

                <!-- Title -->

                <div class="mb-3">

                    <label class="form-label">

                        Title

                    </label>

                    <input
                            class="form-control"
                            type="text"
                            name="title"
                            th:value="${post.title}"
                            required>

                </div>

                <!-- Content -->

                <div class="mb-3">

                    <label class="form-label">

                        Content

                    </label>

                    <textarea
                            class="form-control"
                            rows="8"
                            name="content"
                            required
                            th:text="${post.content}">
                    </textarea>

                </div>

                <!-- Current Image -->

                <div class="mb-3"
                     th:if="${post.imageName!=null}">

                    <label class="form-label">

                        Current Image

                    </label>

                    <br>

                    <img
                            th:src="@{/uploads/{img}(img=${post.imageName})}"
                            style="width:250px;height:180px;object-fit:cover;"
                            class="rounded shadow">

                </div>

                <!-- Change Image -->

                <div class="mb-3">

                    <label class="form-label">

                        Change Image

                    </label>

                    <input
                            class="form-control"
                            type="file"
                            name="imageFile">

                </div>

                <!-- Category -->

                <div class="mb-3">

                    <label class="form-label">

                        Category

                    </label>

                    <select
                            class="form-select"
                            name="category.id">

                        <option
                                th:each="category:${categories}"

                                th:value="${category.id}"

                                th:text="${category.name}"

                                th:selected="${category.id==post.category.id}">
                        </option>

                    </select>

                </div>

                <button
                        class="btn btn-success">

                    <i class="bi bi-check-circle-fill"></i>

                    Update Post

                </button>

                <a
                        class="btn btn-secondary"

                        th:href="@{/post/{id}(id=${post.id})}">

                    <i class="bi bi-x-circle-fill"></i>

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
