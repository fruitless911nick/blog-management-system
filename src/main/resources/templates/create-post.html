
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>TrueBook | Create Post</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body class="bg-light" style="
        background-image: url('/background-image/wall2.jpg');
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
    ">

<div class="container mt-4">

    <!-- Navbar -->

	<nav class="navbar navbar-expand-lg navbar-dark rounded shadow"
		     style="background-color: #1f1f1f">	
		    <div class="container-fluid">

        <div class="container-fluid"  >

            <a class="navbar-brand fw-bold" th:href="@{/}">
                <i class="bi bi-journal-bookmark-fill"></i>
                TrueBook
            </a>

            <div class="ms-auto d-flex align-items-center">

                <span class="text-white me-3">
                    <i class="bi bi-person-circle"></i>
                    Welcome,
                    <strong th:text="${user.username}"></strong> 👋
                </span>

                <a class="btn btn-success me-2"
                   th:href="@{/}">
                    <i class="bi bi-house-fill"></i>
                    Home
                </a>

                <a class="btn btn-warning me-2"
                   th:href="@{/profile}">
                    <i class="bi bi-person-badge-fill"></i>
                    My Profile
                </a>

                <a class="btn btn-danger"
                   th:href="@{/logout}">
                    <i class="bi bi-box-arrow-right"></i>
                    Logout
                </a>

            </div>

        </div>

    </nav>

    <br>

    <!-- Create Post Card -->

    <div class="card shadow" style="background-color: #ffeddf" >

        <div class="card-body">

            <h2 class="mb-4">

                <i class="bi bi-plus-circle-fill text-success"></i>

                Create New Post

            </h2>

            <form th:action="@{/post/save}"
                  method="post"
                  enctype="multipart/form-data">

                <!-- Title -->

                <div class="mb-3">

                    <label class="form-label">

                        <strong>Title</strong>

                    </label>

                    <input
                            class="form-control"
                            type="text"
                            name="title"
                            placeholder="Enter Post Title"
                            required>

                </div>

                <!-- Category -->

                <div class="mb-3">

                    <label class="form-label">

                        <strong>Category</strong>

                    </label>

                    <select
                            class="form-select"
                            name="category.id"
                            required>

                        <option value="">
                            Select Category
                        </option>

                        <option
                                th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}">
                        </option>

                    </select>

                </div>

                <!-- Thumbnail -->

                <div class="mb-3">

                    <label class="form-label">

                        <strong>Thumbnail</strong>

                    </label>

                    <input
                            class="form-control"
                            type="file"
                            name="imageFile"
                            accept="image/*">

                </div>

                <!-- Content -->

                <div class="mb-3">

                    <label class="form-label">

                        <strong>Content</strong>

                    </label>

                    <textarea
                            class="form-control"
                            rows="8"
                            name="content"
                            placeholder="Write your post here..."
                            required></textarea>

                </div>

                <!-- Buttons -->

                <button
                        type="submit"
                        class="btn btn-success">

                    <i class="bi bi-send-fill"></i>

                    Publish Post

                </button>

                <a
                        class="btn btn-secondary"
                        th:href="@{/}">

                    <i class="bi bi-arrow-left-circle"></i>

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
