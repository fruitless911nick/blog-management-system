<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>TrueBook | View Post</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body class="bg-light"
style="
        background-image: url('/background-image/wall2.jpg');
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
    ">

<div class="container mt-4">

	
	<nav class="navbar navbar-expand-lg navbar-dark rounded shadow"
		     style="background-color: #1f1f1f;">	
		    <div class="container-fluid"> <!--<nav class="navbar navbar-expand-lg navbar-dark bg-primary rounded shadow"> -->

	    <div class="container-fluid">

	        <a class="navbar-brand fw-bold" th:href="@{/}">
	            <i class="bi bi-journal-bookmark-fill"></i>
	            TrueBook
	        </a>

	        <div class="ms-auto d-flex align-items-center">

	            <span class="text-white me-3">
	                <i class="bi bi-person-circle"></i>
	                Welcome,
	                <strong th:text="${user.username}"></strong> 👋
	            </span>

	            <a class="btn btn-success me-2"
	               th:href="@{/}">
	                <i class="bi bi-house-fill"></i>
	                Home
	            </a>

	            <a class="btn btn-warning me-2"
	               th:href="@{/profile}">
	                <i class="bi bi-person-badge-fill"></i>
	                My Profile
	            </a>

	            <a class="btn btn-primary me-2"
	               th:href="@{/post/create}">
	                <i class="bi bi-plus-circle"></i>
	                Create Post
	            </a>

	            <a class="btn btn-danger"
	               th:href="@{/logout}">
	                <i class="bi bi-box-arrow-right"></i>
	                Logout
	            </a>

	        </div>

	    </div>

	</nav>
	

    <br>

    <!-- Post -->

    <div class="card shadow">

        <img
                th:if="${post.imageName!=null}"
                th:src="@{/uploads/{img}(img=${post.imageName})}"
                class="card-img-top"
                style="height:300px;object-fit:cover;">

        <div class="card-body">

            <h2 th:text="${post.title}"></h2>

            <hr>

            <p>

                <strong>

                    <i class="bi bi-person-fill"></i>

                    Author :

                </strong>

                <span th:text="${post.author.username}"></span>

                <span
                        class="badge bg-success ms-2"
                        th:if="${post.author.email==#authentication.name}">

                    Your Post

                </span>

            </p>

            <p>

                <strong>

                    <i class="bi bi-calendar-event"></i>

                    Posted :

                </strong>

                <span
                        th:text="${#temporals.format(post.createdAt,'dd MMM yyyy, hh:mm a')}">
                </span>

            </p>

            <p th:if="${post.category!=null}">

                <strong>

                    <i class="bi bi-tag-fill"></i>

                    Category :

                </strong>

                <span
                        th:text="${post.category.name}">
                </span>

            </p>

            <hr>

            <p th:text="${post.content}"></p>

            <hr>

            <!-- Like -->

            <form
                    th:action="@{/post/{id}/like(id=${post.id})}"
                    method="post">

                <button
                        class="btn btn-outline-danger">

                    <span th:if="${liked}">
                        ❤️ Unlike
                    </span>

                    <span th:unless="${liked}">
                        🤍 Like
                    </span>

                </button>

            </form>

            <br>

            <span class="badge bg-danger fs-6">

                ❤️

                <span th:text="${likeCount}"></span>

            </span>

            <span class="badge bg-primary fs-6">

                💬

                <span th:text="${post.comments.size()}"></span>

            </span>

            <br><br>

            <!-- Edit/Delete -->

            <div
                    th:if="${post.author.email==#authentication.name}">

                <a
                        class="btn btn-warning"

                        th:href="@{/post/edit/{id}(id=${post.id})}">

                    <i class="bi bi-pencil-square"></i>

                    Edit

                </a>

                <a class="btn btn-danger" th:href="@{/post/delete/{id}(id=${post.id})}"

                        onclick="return confirm('Delete this post?')">

                    <i class="bi bi-trash-fill"></i>

                    Delete

                </a>

            </div>

        </div>

    </div>

    <br>

    <!-- Comment Form -->

    <div class="card shadow">

        <div class="card-body">

            <h4>

                <i class="bi bi-chat-dots-fill"></i>

                Add Comment

            </h4>

            <form
                    action="/comment/add"
                    method="post">

                <input
                        type="hidden"
                        name="postId"
                        th:value="${post.id}">

                <textarea
                        class="form-control"
                        rows="4"
                        name="content"
                        placeholder="Write your comment..."
                        required></textarea>

                <br>

                <button
                        class="btn btn-success">

                    <i class="bi bi-send-fill"></i>

                    Add Comment

                </button>

            </form>

        </div>

    </div>

    <br>

    <!-- Comments -->

    <div class="card shadow">

        <div class="card-body">

            <h4>

                <i class="bi bi-chat-left-text-fill"></i>

                Comments

            </h4>

            <hr>

            <div
                    th:each="comment:${post.comments}">

                <div class="card mb-3">

                    <div class="card-body">

                        <h6>

                            <i class="bi bi-person-circle"></i>

                            <span
                                    th:text="${comment.user.username}">
                            </span>

                            <span
                                    class="badge bg-success"

                                    th:if="${comment.user.email==#authentication.name}">

                                You

                            </span>

                        </h6>

                        <p
                                th:text="${comment.content}">
                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <br>

    <div class="text-center">

        <a
                class="btn btn-primary"

                th:href="@{/}">

            <i class="bi bi-arrow-left-circle"></i>

            Back To Home

        </a>

    </div>

    <br>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
