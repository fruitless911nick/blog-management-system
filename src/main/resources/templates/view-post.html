<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<h1 th:text="${post.title}"></h1>
<p>
    Posted on:
    <span th:text="${#temporals.format( post.createdAt,'dd-MM-yyyy HH:mm')}">
    </span>
</p>

<p th:text="${post.content}"></p>

<p>
    Author:
    <span th:text="${post.author.username}">
    </span>
</p>

<br>
<br><br>

<a th:href="@{/post/edit/{id}(id=${post.id})}">
    Edit Post
</a>
<hr>

<h3>Add Comment</h3>

<form action="/comment/add" method="post">

    <input type="hidden" name="postId" th:value="${post.id}">

    <textarea name="content" rows="4" cols="40" required>
    </textarea>

    <br><br>

    <button type="submit">
        Add Comment
    </button>

</form>
<hr>

<h3>Comments</h3>

<div th:each="comment : ${post.comments}">

    <b th:text="${comment.user.username}">
    </b>

    <p th:text="${comment.content}">
    </p>

    <hr>

</div>
<br><br>

<a th:href="@{/post/delete/{id}(id=${post.id})}">
    Delete Post
</a>

<a href="/">
    Back To Home
</a>

</body>
</html>
