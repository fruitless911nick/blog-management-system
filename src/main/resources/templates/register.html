<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	   <style>
	       body {
	           background-color: #f8f9fa;
	       }
	       .register-card {
	           max-width: 500px;
	           margin: auto;
	           margin-top: 50px;
	           padding: 30px;
	           background: white;
	           border-radius: 10px;
	           box-shadow: 0 4px 10px rgba(0,0,0,0.1);
	       }
	   </style>
</head>
<body style="background-color: lightcyan;">
	<div class="container">
	    <div class="register-card">
	        <h3 class="text-center mb-4">Create an Account</h3>

			<form th:action="@{/register}" method="post">
				<div class="mb-3">
				     <label for="fullName" class="form-label">User Name</label>
				     <input type="text" class="form-control" placeholder="Enter your username"  name="username"required></input> 
				</div>
				<div class="mb-3">
				       <label for="email" class="form-label">Email address</label>
				       <input type="email" class="form-control" name="email" placeholder="name@example.com" required></input> 
				       </div>
				 <div class="mb-3">
					   <label for="password" class="form-label">Password</label>
					   <input type="password" class="form-control"  name="password" placeholder="Enter password" minlength="6" required></input>
					   </div>
				 <div class="d-grid">
					   <button type="submit" class="btn btn-primary">Register</button>
					   </div>
			  </form>
			</div>
		</div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
